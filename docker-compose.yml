services:
  blackhole-pool:
    build:
      context: ./pool
      args:
        BUILD_GIT_SHA: ${BUILD_GIT_SHA:-unknown}
        BUILD_GIT_DIRTY: ${BUILD_GIT_DIRTY:-unknown}
        BUILD_SOURCE: ${BUILD_SOURCE:-docker-compose}
        BUILD_TIME_UTC: ${BUILD_TIME_UTC:-unknown}
        BUILD_IMAGE_ID: ${BUILD_IMAGE_ID:-unknown}
    env_file: ./env/.env
    environment:
      RUNTIME_IMAGE_REF: ${RUNTIME_IMAGE_REF:-blackhole-blackhole-pool:latest}
      RUNTIME_IMAGE_ID: ${RUNTIME_IMAGE_ID:-unknown}
      RUNTIME_CONTAINER_NAME: ${RUNTIME_CONTAINER_NAME:-blackhole-blackhole-pool-1}
    ports:
      - "2018:2018"
      - "8081:8080"
    volumes:
      - pool_data:/data
    restart: unless-stopped
    healthcheck:
      # Checks that the API TCP socket on port 8080 (0x1F90) is listening.
      # Uses only /bin/grep + /proc/net/tcp — no curl/wget required in the image.
      test: ["CMD-SHELL", "grep -q ':1F90 ' /proc/net/tcp || grep -q ':1F90 ' /proc/net/tcp6"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    networks:
      umbrel_main_network:
        aliases:
          - pool

  blackhole-dashboard:
    build:
      context: ./dashboard
    ports:
      - "3334:80"
    restart: unless-stopped
    depends_on:
      - blackhole-pool
    networks:
      umbrel_main_network:

networks:
  umbrel_main_network:
    external: true

volumes:
  pool_data:
    external: true
    name: blackhole_pool_data
