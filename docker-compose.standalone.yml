services:
  blackhole-pool:
    build:
      context: ./pool
      args:
        BUILD_GIT_SHA: ${BUILD_GIT_SHA:-unknown}
        BUILD_GIT_DIRTY: ${BUILD_GIT_DIRTY:-unknown}
        BUILD_SOURCE: ${BUILD_SOURCE:-docker-compose}
        BUILD_TIME_UTC: ${BUILD_TIME_UTC:-unknown}
        BUILD_IMAGE_ID: ${BUILD_IMAGE_ID:-unknown}
    env_file: ./env/.env
    environment:
      RUNTIME_IMAGE_REF: ${RUNTIME_IMAGE_REF:-blackhole-blackhole-pool:latest}
      RUNTIME_IMAGE_ID: ${RUNTIME_IMAGE_ID:-unknown}
      RUNTIME_CONTAINER_NAME: ${RUNTIME_CONTAINER_NAME:-blackhole-blackhole-pool-1}
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':1F90 ' /proc/net/tcp || grep -q ':1F90 ' /proc/net/tcp6"]
      interval: 30s
      timeout: 3s
      retries: 6
      start_period: 240s
    volumes:
      - pool_data:/data

  blackhole-dashboard:
    build:
      context: ./dashboard
    network_mode: host
    restart: unless-stopped
    depends_on:
      - blackhole-pool

volumes:
  pool_data:
    name: blackhole_pool_data
