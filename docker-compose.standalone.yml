# ════════════════════════════════════════════════════════════════════════════
#  BlackHole Pool — Standalone overlay (non-Umbrel)
#
#  Used with: docker compose -f docker-compose.yml -f docker-compose.standalone.yml
#  (setup-blackhole.sh selects this automatically on non-Umbrel systems)
#
#  Creates its own bridge network and Docker volume —
#  no external dependencies required.
# ════════════════════════════════════════════════════════════════════════════

services:
  blackhole-pool:
    network_mode: host
    networks: []
    ports: []

  blackhole-dashboard:
    network_mode: host
    networks: []
    ports: []

volumes:
  pool_data:
    name: blackhole_pool_data
